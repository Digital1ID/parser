<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Kub24HD Parser PRO</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:.85;
}

.season{
background:#666;
color:#fff;
}

.source{
background:#0066ff;
color:#fff;
}

.download{
background:#0a9d2a;
color:#fff;
}

.copy{
background:#ff8800;
color:#fff;
}

.poster{
max-width:200px;
border-radius:8px;
}

pre{
background:#111;
color:#0f0;
padding:10px;
overflow:auto;
}

</style>
</head>
<body>

<h1>Kub24HD Playlist Parser PRO</h1>

<div id="season-controls"></div>
<div id="source-controls"></div>

<div id="download-controls"></div>

<div id="output">Loading...</div>

<script>

const proxy="/api/proxy-k24hd?url=";

let currentSeason=1;
let currentSource="main";

async function fetchText(url){

const res=await fetch(proxy+encodeURIComponent(url));
if(!res.ok) return null;

return await res.text();

}

async function fetchJSON(url){

const res=await fetch(proxy+encodeURIComponent(url));
if(!res.ok) return null;

return await res.json();

}

async function getPlayer(postId){

const api=`https://kub24hd.com/wp-admin/admin-ajax.php?action=mix_get_player&post_id=${postId}`;

const json=await fetchJSON(api);

if(!json?.success) return [];

const doc=new DOMParser().parseFromString(json.player,"text/html");

const buttons=[...doc.querySelectorAll("button.source-select-btn")];

return buttons.map(b=>({

label:b.textContent.trim(),
src:b.getAttribute("data-src")

}));

}

function convertEmbedToM3U8(url){

try{

let match=url.match(/embed\/([a-zA-Z0-9]+)/);

if(match)
return `https://media.vdohls.com/${match[1]}/playlist.m3u8`;

if(url.includes(".m3u8"))
return url;

}catch{}

return null;

}

function generateM3U(series){

let m3u = "#EXTM3U\n";

const logo = series.poster || "";
const group = "ซีรี่ย์";

for(const ep of series.episodes){

for(const link of ep.m3u8List){

if(!link) continue;

const season = String(ep.season).padStart(2,"0");
const episode = String(ep.number).padStart(2,"0");

m3u += `#EXTINF:-1 type="series" group-title="${group}" tvg-logo="${logo}" tvg-season="${ep.season}" tvg-episode="${ep.number}", ${series.title} S${season}E${episode}\n`;
m3u += link + "\n";

}

}

return m3u;

}

function generateJSON(series){

return [{

id:series.id,
name:series.title,
category:"ซีรี่ย์",

info:{
poster:series.poster,
plot:series.synopsis,
year:new Date().getFullYear()
},

seasons:[{

season:series.season,

episodes:series.episodes.map(ep=>({

episode:ep.number,
name:ep.epTitle,
video:ep.m3u8List[0]||"",
referrer:"https://hplay.hdplayfull.xyz/"

}))

}]

}];

}

function generateJHAT(series){

function extractYear(title){

const m = title.match(/\((\d{4})\)/);
return m ? parseInt(m[1]) : new Date().getFullYear();

}

function splitName(title){

let nameEN = "";
let nameTH = "";

const match = title.match(/^([^(]+)\(\d{4}\)\s*(.*)$/);

if(match){

nameEN = match[1].trim();
nameTH = match[2].trim();

}else{

nameEN = title;

}

return {nameEN,nameTH};

}

const names = splitName(series.title);
const year = extractYear(series.title);

return [{

player:"p2p/playlist",

id:series.id,

nameEN:names.nameEN,

nameTH:names.nameTH,

name:series.title,

category:"ซีรี่ย์",

info:{
poster:series.poster,
plot:series.synopsis,
year:year,
sound:"พากย์ไทย"
},

video:series.id

}];

}

function downloadFile(name,data){

const blob=new Blob([data]);

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download=name;

a.click();

}

function copyText(text){

navigator.clipboard.writeText(text);

alert("Copied");

}

async function main(){

const params=new URLSearchParams(location.search);

const ids=(params.get("ids")||"backstreet-rookie-2020").split(",");

const output=document.getElementById("output");

output.innerHTML="Loading...";

for(const id of ids){

const url=`https://kub24hd.com/series/${id}/`;

const html=await fetchText(url);

if(!html){

output.innerHTML+="โหลดไม่สำเร็จ";

continue;

}

const doc=new DOMParser().parseFromString(html,"text/html");

const title=doc.querySelector("h1")?.textContent.trim()||id;

const img=doc.querySelector(".wp-post-image");

const poster=img?.dataset.src||img?.src||"";

const synopsis=
doc.querySelector(".entry-content p")?.textContent.trim()||
"";

const seasonBtns=[...doc.querySelectorAll("button.season-btn")];

const seasonControls=document.getElementById("season-controls");

seasonControls.innerHTML="";

seasonBtns.forEach((b,i)=>{

const text=b.textContent.trim();

const btn=document.createElement("button");

btn.className="season";

btn.textContent=text;

btn.onclick=()=>{

currentSeason=i+1;
main();

};

seasonControls.appendChild(btn);

});

const seasonId=seasonBtns[currentSeason-1]?.getAttribute("season-id");

const epArea=doc.querySelector(`#eplist div[data-season="${seasonId}"]`);

const epBtns=[...epArea.querySelectorAll("button.ep")];

const episodes=await Promise.all(epBtns.map(async(btn,i)=>{

const postId=btn.id;

const epTitle=btn.textContent.trim();

const sources=await getPlayer(postId);

let chosen=
sources.find(s=>
currentSource==="backup"
?/backup|สำรอง/i.test(s.label)
:/main|หลัก|server\s*1/i.test(s.label)
)||sources[0];

const m3u8=chosen?convertEmbedToM3U8(chosen.src):null;

return{

number:i+1,
epTitle,
season:currentSeason,
m3u8List:[m3u8]

};

}));

const series={

id,
title,
poster,
synopsis,
season:currentSeason,
episodes

};

const m3u=generateM3U(series);

const json=JSON.stringify(generateJSON(series),null,2);

const jhat=JSON.stringify(generateJHAT(series),null,2);

document.getElementById("download-controls").innerHTML=`

<button class="download" onclick='downloadFile("${id}.m3u",\`${m3u}\`)'>Download M3U</button>

<button class="download" onclick='downloadFile("${id}.json",\`${json}\`)'>Download JSON</button>

<button class="download" onclick='downloadFile("${id}.jhat.json",\`${jhat}\`)'>Download JHAT</button>

<button class="copy" onclick='copyText(\`${json}\`)'>Copy JSON</button>

`;

output.innerHTML=`

<h2>${title}</h2>

<img class="poster" src="${poster}">

<p>${synopsis}</p>

<h3>M3U</h3>
<pre>${m3u}</pre>

<h3>JSON</h3>
<pre>${json}</pre>

<h3>JHAT</h3>
<pre>${jhat}</pre>

`;

}

}

main();

</script>

</body>
</html>
